<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, viewport-fit=cover">
    <title>Golf Scorecard - DF Points</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a3b2f;
            margin: 0;
            padding: 16px;
            color: #1a2a1f;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header & Admin Button */
        .header {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #2d6a4f;
        }
        
        .admin-toggle {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .admin-toggle.admin-active {
            background: #4caf50;
        }
        
        /* Player Selector */
        .player-selector {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .player-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .player-btn {
            background: #e8f5e9;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .player-btn.active {
            background: #2d6a4f;
            color: white;
        }
        
        .add-player-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-player-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        /* Scorecard Table */
        .scorecard {
            background: white;
            border-radius: 16px;
            overflow-x: auto;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 600px;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 10px 6px;
            text-align: center;
            vertical-align: middle;
        }
        
        th {
            background: #2d6a4f;
            color: white;
            font-weight: bold;
        }
        
        .hole-number {
            background: #e8f5e9;
            font-weight: bold;
        }
        
        .par-row td {
            background: #f1f8e9;
            font-weight: bold;
        }
        
        .score-input {
            width: 50px;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        
        .score-input:focus {
            outline: none;
            border-color: #2d6a4f;
        }
        
        .df-points {
            font-weight: bold;
            color: #e65100;
        }
        
        .total-row {
            background: #e0f2f1;
            font-weight: bold;
        }
        
        /* Leaderboard */
        .leaderboard {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .leaderboard h3 {
            margin: 0 0 15px 0;
            color: #2d6a4f;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .prize-badge {
            background: gold;
            color: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leaderboard-table th,
        .leaderboard-table td {
            border: none;
            border-bottom: 1px solid #eee;
            padding: 12px 8px;
            text-align: left;
        }
        
        .rank-1 { background: #fff9c4; }
        .rank-2 { background: #e8e8e8; }
        .rank-3 { background: #ffe0b2; }
        
        .prize {
            font-weight: bold;
            color: #ff6d00;
        }
        
        .refresh-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .admin-panel-hidden {
            display: none;
        }
        
        @media (max-width: 700px) {
            th, td {
                padding: 8px 4px;
                font-size: 10px;
            }
            .score-input {
                width: 40px;
                font-size: 12px;
                padding: 6px;
            }
            .player-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⛳ DF-Points Scorecard</h1>
        <button id="adminToggleBtn" class="admin-toggle">🔑 Admin Mode</button>
    </div>

    <!-- Player Selection Area -->
    <div class="player-selector">
        <strong>👥 Players:</strong>
        <div id="playerButtons" class="player-buttons"></div>
        <div id="adminPlayerControls" class="add-player-area admin-panel-hidden">
            <input type="text" id="newPlayerName" placeholder="Player name">
            <button id="addPlayerBtn">➕ Add Player</button>
        </div>
    </div>

    <!-- Scorecard -->
    <div class="scorecard">
        <table id="scorecardTable">
            <thead>
                <tr>
                    <th>Hole</th>
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
                    <th>Out</th>
                    <th>10</th><th>11</th><th>12</th><th>13</th><th>14</th><th>15</th><th>16</th><th>17</th><th>18</th>
                    <th>In</th>
                    <th>Total</th>
                    <th>DF-Pts</th>
                </tr>
            </thead>
            <tbody>
                <tr class="par-row">
                    <td>Par</td>
                    <td>4</td><td>5</td><td>4</td><td>3</td><td>4</td><td>4</td><td>3</td><td>5</td><td>4</td>
                    <td>36</td>
                    <td>4</td><td>5</td><td>4</td><td>3</td><td>5</td><td>4</td><td>3</td><td>4</td><td>4</td>
                    <td>36</td>
                    <td>72</td>
                    <td></td>
                </tr>
                <tr id="scoreRow">
                    <td>Score</td>
                    <!-- 18 holes + Out/In/Total will be filled by JS -->
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard">
        <h3>🏆 Leaderboard <span class="prize-badge">Top 3 win prizes!</span></h3>
        <table class="leaderboard-table" id="leaderboardTable">
            <thead>
                <tr><th>Rank</th><th>Player</th><th>Total DF-Points</th><th>Prize</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="refreshScoresBtn" class="refresh-btn">⟳ Refresh Scores</button>
    </div>
</div>

<script>
    // ----- COURSE DATA -----
    const PAR = [4,5,4,3,4,4,3,5,4, 4,5,4,3,5,4,3,4,4];
    const HOLE_NAMES = Array.from({length: 18}, (_, i) => (i+1).toString());
    
    // ----- STATE -----
    let isAdmin = false;
    let adminKey = '';
    let currentPlayer = null;
    let players = [];
    let scores = {}; // { playerName: [score1..score18] }
    let dfPoints = {}; // { playerName: totalDF }
    
    const ADMIN_KEY = 'golfadmin123';
    const API_BASE = '';
    
    // ----- HELPER FUNCTIONS -----
    function calculateDFPoints(score, par) {
        if (score === 0) return 0; // No score yet
        const diff = score - par;
        if (diff === -1) return 4;  // Birdie
        if (diff === 0) return 2;   // Par
        if (diff === 1) return 1;   // Bogey
        return 0;                   // Double bogey or worse
    }
    
    function computePlayerStats(playerName) {
        const playerScores = scores[playerName] || Array(18).fill(0);
        let totalDF = 0;
        let totalGross = 0;
        for (let i = 0; i < 18; i++) {
            const s = playerScores[i];
            if (s > 0) {
                totalGross += s;
                totalDF += calculateDFPoints(s, PAR[i]);
            }
        }
        return { totalDF, totalGross };
    }
    
    function updateAllDFPoints() {
        for (let player of players) {
            dfPoints[player] = computePlayerStats(player).totalDF;
        }
    }
    
    // ----- RENDER SCORECARD -----
    function renderScorecard() {
        const scoreRow = document.getElementById('scoreRow');
        if (!scoreRow) return;
        
        if (!currentPlayer || !scores[currentPlayer]) {
            // Show empty row
            let emptyCells = '<td>Score</td>';
            for (let i = 0; i < 18; i++) emptyCells += '<td>-</td>';
            emptyCells += '<td>-</td><td>-</td><td>-</td>'; // Out, In, Total
            emptyCells += '<td>-</td>'; // DF Points
            scoreRow.innerHTML = emptyCells;
            return;
        }
        
        const playerScores = scores[currentPlayer] || Array(18).fill(0);
        let frontNine = 0, backNine = 0, total = 0;
        let totalDF = 0;
        
        let cells = '<td>Score</td>';
        for (let i = 0; i < 18; i++) {
            const scoreVal = playerScores[i];
            const display = scoreVal === 0 ? '-' : scoreVal;
            const df = scoreVal > 0 ? calculateDFPoints(scoreVal, PAR[i]) : 0;
            totalDF += df;
            if (scoreVal > 0) {
                if (i < 9) frontNine += scoreVal;
                else backNine += scoreVal;
                total += scoreVal;
            }
            if (isAdmin) {
                cells += `<td><input type="number" class="score-input" data-hole="${i}" value="${scoreVal === 0 ? '' : scoreVal}" placeholder="-"></td>`;
            } else {
                cells += `<td>${display}${df > 0 ? ` (${df})` : ''}</td>`;
            }
        }
        
        cells += `<td>${frontNine || '-'}</td>`;
        cells += `<td>${backNine || '-'}</td>`;
        cells += `<td>${total || '-'}</td>`;
        cells += `<td class="df-points">${totalDF}</td>`;
        
        scoreRow.innerHTML = cells;
        
        // Attach event listeners for admin inputs
        if (isAdmin && currentPlayer) {
            document.querySelectorAll('.score-input').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const hole = parseInt(e.target.dataset.hole);
                    let value = parseInt(e.target.value);
                    if (isNaN(value) || value < 0) value = 0;
                    if (value > 20) value = 20; // sanity
                    await updateScore(currentPlayer, hole, value);
                });
            });
        }
    }
    
    // ----- API CALLS -----
    async function fetchGameData() {
        try {
            const res = await fetch('/api/scores');
            const data = await res.json();
            players = data.players || [];
            scores = data.scores || {};
            // Ensure scores structure
            for (let p of players) {
                if (!scores[p]) scores[p] = Array(18).fill(0);
                if (scores[p].length !== 18) {
                    // migrate old format
                    const oldTotal = scores[p];
                    if (typeof oldTotal === 'number') {
                        scores[p] = Array(18).fill(0);
                    } else {
                        while(scores[p].length < 18) scores[p].push(0);
                    }
                }
            }
            updateAllDFPoints();
            if (currentPlayer && !players.includes(currentPlayer)) {
                currentPlayer = players[0] || null;
            }
            renderPlayerButtons();
            renderScorecard();
            renderLeaderboard();
        } catch (err) {
            console.error('Fetch error:', err);
        }
    }
    
    async function updateScore(playerName, holeIndex, score) {
        if (!isAdmin) return;
        const newScores = [...(scores[playerName] || Array(18).fill(0))];
        newScores[holeIndex] = score;
        scores[playerName] = newScores;
        // Optimistic update, then sync
        renderScorecard();
        await fetch('/api/admin/update-score-full', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: adminKey, playerName, scores: newScores })
        });
        await fetchGameData();
    }
    
    async function addPlayer(name) {
        if (!isAdmin || !name) return;
        await fetch('/api/admin/add-player', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: adminKey, playerName: name })
        });
        await fetchGameData();
    }
    
    async function removePlayer(name) {
        if (!isAdmin) return;
        await fetch('/api/admin/remove-player', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: adminKey, playerName: name })
        });
        if (currentPlayer === name) currentPlayer = null;
        await fetchGameData();
    }
    
    // ----- RENDER PLAYERS -----
    function renderPlayerButtons() {
        const container = document.getElementById('playerButtons');
        if (!container) return;
        if (players.length === 0) {
            container.innerHTML = '<i>No players added yet. Admin can add players.</i>';
            return;
        }
        let html = '';
        for (let p of players) {
            html += `<button class="player-btn ${currentPlayer === p ? 'active' : ''}" data-player="${p}">${p} (${dfPoints[p] || 0} pts)</button>`;
            if (isAdmin) {
                html += `<button class="remove-player-btn" data-remove="${p}" style="background:#f44336; color:white; border:none; border-radius:20px; padding:4px 10px; margin-left:-10px; margin-right:10px;">🗑️</button>`;
            }
        }
        container.innerHTML = html;
        
        document.querySelectorAll('.player-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPlayer = btn.dataset.player;
                renderPlayerButtons();
                renderScorecard();
            });
        });
        
        if (isAdmin) {
            document.querySelectorAll('.remove-player-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (confirm('Remove player?')) removePlayer(btn.dataset.remove);
                });
            });
        }
    }
    
    // ----- RENDER LEADERBOARD -----
    function renderLeaderboard() {
        const tbody = document.getElementById('leaderboardBody');
        if (!tbody) return;
        const playerPoints = players.map(p => ({ name: p, points: dfPoints[p] || 0 }));
        playerPoints.sort((a,b) => b.points - a.points);
        const top3 = playerPoints.slice(0,3);
        const prizes = ['🏆 1st Place - $50', '🥈 2nd Place - $30', '🥉 3rd Place - $20'];
        let html = '';
        playerPoints.forEach((player, idx) => {
            let rankClass = '';
            let prizeText = '';
            if (idx === 0) rankClass = 'rank-1';
            else if (idx === 1) rankClass = 'rank-2';
            else if (idx === 2) rankClass = 'rank-3';
            if (idx < 3) prizeText = prizes[idx];
            html += `<tr class="${rankClass}">
                        <td>${idx+1}</td>
                        <td>${player.name}</td>
                        <td>${player.points}</td>
                        <td class="prize">${prizeText}</td>
                     </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    // ----- ADMIN AUTH -----
    async function loginAsAdmin(key) {
        const res = await fetch('/api/admin/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key })
        });
        const data = await res.json();
        if (data.success) {
            isAdmin = true;
            adminKey = key;
            document.getElementById('adminToggleBtn').classList.add('admin-active');
            document.getElementById('adminToggleBtn').innerText = '👑 Admin Mode ON';
            document.getElementById('adminPlayerControls').classList.remove('admin-panel-hidden');
            await fetchGameData();
        } else {
            alert('Invalid admin key');
        }
    }
    
    function logoutAdmin() {
        isAdmin = false;
        adminKey = '';
        document.getElementById('adminToggleBtn').classList.remove('admin-active');
        document.getElementById('adminToggleBtn').innerText = '🔑 Admin Mode';
        document.getElementById('adminPlayerControls').classList.add('admin-panel-hidden');
        fetchGameData();
    }
    
    // ----- INIT & EVENT LISTENERS -----
    document.getElementById('adminToggleBtn').addEventListener('click', () => {
        if (isAdmin) {
            logoutAdmin();
        } else {
            const key = prompt('Enter admin key:');
            if (key) loginAsAdmin(key);
        }
    });
    
    document.getElementById('addPlayerBtn')?.addEventListener('click', () => {
        const name = document.getElementById('newPlayerName').value.trim();
        if (name) addPlayer(name);
        document.getElementById('newPlayerName').value = '';
    });
    
    document.getElementById('refreshScoresBtn')?.addEventListener('click', () => {
        fetchGameData();
    });
    
    // Add missing backend endpoint for full score update
    // But we'll also update server.js separately - for now, manually add to server
    fetchGameData();
    setInterval(fetchGameData, 30000);
</script>
</body>
</html>
